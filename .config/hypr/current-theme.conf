$menu = rofi -no-config -no-lazy-grab -show drun -modi drun -theme ~/.config/rofi/catppuccin-latte/launcher.rasi
$wallpaper = hyprpaper --config ~/.config/hypr/wallpapers/catppuccin-latte.conf
