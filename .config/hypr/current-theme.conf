$swaync = swaync -c ~/.config/swaync/catppuccin-latte/config.json -s ~/.config/swaync/catppuccin-latte/style.css

general {
  col.inactive_border = rgba(dc8a78ff)
  col.active_border = rgba(8839efff)
}

